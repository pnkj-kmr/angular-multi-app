<div class="shell">
  <header class="shell-header">
    <span class="brand">{{ title }}</span>
    <span class="tag">Angular 14 shell</span>
  </header>

  <div class="shell-body">
    <nav class="shell-sidebar">
      <p class="group">Legacy</p>
      <a
        *ngFor="let m of legacyMenus"
        [routerLink]="m.link"
        routerLinkActive="active"
        class="item"
        >{{ m.label }}</a
      >

      <p class="group">New (v2)</p>
      <a
        *ngFor="let m of v2Menus"
        [routerLink]="m.link"
        routerLinkActive="active"
        class="item"
      >
        {{ m.label }}
        <span class="badge" *ngIf="m.badge">{{ m.badge }}</span>
      </a>
    </nav>

    <main class="shell-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
