# Local, self-contained nginx config that serves the two real builds directly
# from their dist/ folders (no symlinks needed). Generated for local verification.
#
#   http://localhost:8099/         -> ui (Angular 14 shell, owns /v2/:feature)
#   http://localhost:8099/v2-app/  -> ui_oss (Angular 21 app, loaded in the iframe)
#
# Run:  nginx -c <abs path>/deploy/nginx.local.conf
# Stop: nginx -c <abs path>/deploy/nginx.local.conf -s stop

worker_processes 1;
error_log /tmp/angular-multi-nginx.error.log;
pid /tmp/angular-multi-nginx.pid;
events { worker_connections 64; }

http {
    include       /opt/homebrew/etc/nginx/mime.types;
    default_type  application/octet-stream;
    access_log /tmp/angular-multi-nginx.access.log;

    server {
        listen       8099;
        server_name  localhost;

        location /v2-app/ {
            alias /Users/pankaj/Github/angular-multi-app/ui_oss/dist/ui_oss/browser/;
            try_files $uri $uri/ /v2-app/index.html;
            add_header Content-Security-Policy "frame-ancestors 'self'" always;
            location = /v2-app/index.html {
                add_header Cache-Control "no-cache" always;
                add_header Content-Security-Policy "frame-ancestors 'self'" always;
            }
        }

        location / {
            root /Users/pankaj/Github/angular-multi-app/ui/dist/ui;
            try_files $uri $uri/ /index.html;
            location = /index.html { add_header Cache-Control "no-cache" always; }
        }
    }
}
