# Single-origin nginx config for the Angular 14 shell (ui) + Angular 21 v2 app (ui_oss).
# Both apps are served from one origin so the auth/session cookie is first-party
# and shared automatically. See docs/app1.md (Phase 0).
#
#   /            -> Angular 14 shell  (ui/dist) — also owns the /v2/:feature routes
#   /v2-app/     -> Angular 21 app    (ui_oss/dist, built with --base-href /v2-app/)
#
# IMPORTANT: the static v2 app lives at /v2-app/ (what the iframe loads), which is
# DISTINCT from the shell's user-facing /v2/:feature route. That way refreshing
# /v2/reports is served by the shell (location /) and not the v2 app standalone.

server {
    listen       8080;
    server_name  localhost;

    # ---- Angular 21 v2 app (loaded inside the shell's iframe) --------------
    location /v2-app/ {
        alias /var/www/v2/;
        try_files $uri $uri/ /v2-app/index.html;

        # Allow the shell (same origin) to frame this app; do NOT send X-Frame-Options: DENY here.
        add_header Content-Security-Policy "frame-ancestors 'self'" always;

        # v2 index.html must never be cached so new deploys are picked up.
        location = /v2-app/index.html {
            add_header Cache-Control "no-cache" always;
            add_header Content-Security-Policy "frame-ancestors 'self'" always;
        }
    }

    # ---- Angular 14 shell (root app) --------------------------------------
    location / {
        root /var/www/root-app;
        try_files $uri $uri/ /index.html;

        location = /index.html {
            add_header Cache-Control "no-cache" always;
        }
    }

    # ---- Hashed, immutable bundles (both apps) ----------------------------
    location ~* \.[0-9a-f]{8,}\.(js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }
}
